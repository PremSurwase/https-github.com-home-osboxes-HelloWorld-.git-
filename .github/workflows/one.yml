name: Hello World CI

on: [push]

jobs:
  # Job 1: Existing greeting job
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Greeting
        run: echo "Hello, world!"

  # Job 2: New calculation job
  calculate:
    runs-on: ubuntu-latest
    steps:
      - name: Add Numbers
        run: |
          # Define two numbers
          NUM1=10
          NUM2=20
          
          # Perform addition using shell arithmetic
          SUM=$((NUM1 + NUM2))
          
          echo "The sum of $NUM1 and $NUM2 is: $SUM"
